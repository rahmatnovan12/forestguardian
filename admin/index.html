<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Forest Guardian</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Trik CSS untuk mempermodern UI bawaan CMS */
      header {
        background-color: #022c22 !important; /* Mengubah bar atas menjadi Hijau Emerald Tua */
      }
      header h1 {
        color: #f59e0b !important; /* Mengubah teks judul menjadi Kuning Amber */
        font-weight: bold !important;
      }
      span[class*="Button"] {
        border-radius: 8px !important; /* Membuat tombol lebih melengkung modern */
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Menyuntikkan desain kartu artikel modern ke panel pratinjau kanan
      CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css");
      
      var PostPreview = createClass({
        render: function() {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || 'Judul Artikel Kamu';
          var description = entry.getIn(['data', 'description']) || 'Ringkasan tulisan...';
          var thumbnail = this.props.getAsset(entry.getIn(['data', 'thumbnail']));
          var body = this.props.widgetFor('body');
          var dateObj = entry.getIn(['data', 'date']);
          var dateString = dateObj ? new Date(dateObj).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Tanggal Rilis';

          return h('div', { className: 'bg-stone-50 p-6 min-h-screen font-sans' },
            h('div', { className: 'max-w-xl mx-auto bg-white rounded-2xl shadow-lg border border-stone-100 overflow-hidden' },
              thumbnail ? h('img', { src: thumbnail.toString(), className: 'w-full h-52 object-cover' }) : 
                          h('div', { className: 'w-full h-52 bg-emerald-900/10 flex items-center justify-center text-stone-400' }, 'Belum ada foto utama'),
              h('div', { className: 'p-6' },
                h('span', { className: 'text-xs font-bold uppercase text-emerald-700 tracking-wider' }, dateString),
                h('h2', { className: 'text-2xl font-extrabold text-emerald-950 mt-2' }, title),
                h('p', { className: 'text-stone-600 text-sm mt-3 border-l-4 border-amber-500 pl-3 italic bg-stone-50 py-1' }, description),
                h('div', { className: 'mt-6 text-stone-800 leading-relaxed border-t border-stone-100 pt-4 font-light text-sm' }, body)
              )
            )
          );
        }
      });
      CMS.registerPreviewTemplate("blog", PostPreview);
    </script>
  </body>
</html>
